<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Campus Events</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <h1>Approved Campus Events</h1>
    <div class="event-feed">
        <div th:each="event : ${events}" class="event-card">
            <h2 th:text="${event.bookingReference}"></h2>
            <p><strong>Where:</strong> <span th:text="${event.facility.name}"></span></p>
            <p><strong>When:</strong> <span th:text="${event.startTime}"></span></p>
        </div>
    </div>
</body>
</html>
