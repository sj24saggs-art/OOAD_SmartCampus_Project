<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCampus | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #2563eb; --primary-hover: #1d4ed8; --bg: #f8fafc; 
            --text-main: #0f172a; --text-muted: #64748b; --white: #ffffff; --border: #e2e8f0;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        .login-card { 
            background: var(--white); 
            border-radius: 12px; 
            padding: 2.5rem; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
            width: 100%; 
            max-width: 400px; 
            border: 1px solid var(--border);
            text-align: center;
        }
        .logo-icon {
            background: #dbeafe;
            color: var(--primary);
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        h2 { margin-bottom: 0.5rem; font-weight: 600; }
        p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
        
        .form-group { text-align: left; margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            outline: none; 
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        input:focus, select:focus { border-color: var(--primary); }
        
        .btn-login { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 1rem;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:hover { background: var(--primary-hover); }
        
        .error-msg { 
            background: #fee2e2; 
            color: var(--danger); 
            padding: 10px; 
            border-radius: 6px; 
            font-size: 0.85rem; 
            margin-bottom: 1rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">
            <i data-lucide="shield-check"></i>
        </div>
        <h2>SmartCampus Login</h2>
        <p>Access your assigned module</p>

        <div th:if="${error}" class="error-msg" th:text="${error}"></div>

        <form th:action="@{/login/auth}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="e.g. shivani" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>System Role</label>
                <select name="role">
                    <option value="ORGANIZER">Event Organizer</option>
                    <option value="MANAGER">Facility Manager</option>
                    <option value="ADMIN">System Admin</option>
                </select>
            </div>
            <button type="submit" class="btn-login">
                Secure Access <i data-lucide="arrow-right" style="width:18px;"></i>
            </button>
        </form>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
