<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartCampus | Facility Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; --white: #ffffff; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 2rem; }
        .card { background: var(--white); border-radius: 12px; padding: 1.5rem; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
        .btn-approve { background: #dcfce7; color: #166534; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .btn-reject { background: #fee2e2; color: #991b1b; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Facility Manager Dashboard</h1>
    <p>Shalmali V Ram | PES1UG23CS535</p>

    <div class="card">
        <h3>Pending Approval Queue</h3>
        <table>
            <thead>
                <tr>
                    <th>Ref ID</th>
                    <th>Facility</th>
                    <th>Event Type</th> <th>Date & Time</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="b : ${pendingBookings}">
                    <td th:text="${'#REQ-' + b.id}"></td>
                    <td th:text="${b.bookingReference}"></td>
                    <td th:text="${b.eventType}" style="font-weight:600; color:var(--accent);"></td>
                    <td th:text="${#temporals.format(b.startTime, 'dd-MM-yyyy HH:mm')}"></td>
                    <td>
                        <form th:action="@{/manager/approve/{id}(id=${b.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn-approve">Approve</button>
                        </form>
                        <form th:action="@{/manager/reject/{id}(id=${b.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn-reject">Reject</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
