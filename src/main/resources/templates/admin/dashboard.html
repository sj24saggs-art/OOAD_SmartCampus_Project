<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard - Smart Campus</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <h2>Admin System Module</h2>
        <a href="/admin/reports">View Health Reports</a>
    </nav>
    
    <main>
        <h3>Master Schedule Oversight</h3>
        <table>
            <thead>
                <tr>
                    <th>Facility</th>
                    <th>Organizer</th>
                    <th>Time Slot</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="booking : ${bookings}">
                    <td th:text="${booking.facility.name}"></td>
                    <td th:text="${booking.organizer.name}"></td>
                    <td th:text="${booking.startTime} + ' - ' + ${booking.endTime}"></td>
                    <td><span th:class="${booking.status}" th:text="${booking.status}"></span></td>
                    <td>
                        <button th:if="${booking.status.name() == 'PENDING'}">Approve</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
