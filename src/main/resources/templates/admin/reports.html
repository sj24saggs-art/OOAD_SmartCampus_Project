<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Facility Health Reports</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <h3>System Analytics & Facility Health</h3>
    <div class="stats-grid">
        <div class="card">
            <h4>Total Usage</h4>
            <p th:text="${totalBookings}">0</p>
        </div>
        <div class="card">
            <h4>System Status</h4>
            <p style="color: green;">Optimal</p>
        </div>
    </div>

    <h4>Facility Operational Status</h4>
    <ul>
        <li th:each="f : ${facilities}">
            <span th:text="${f.name}"></span> - 
            <strong th:text="${f.isOperational ? 'OPERATIONAL' : 'MAINTENANCE'}"></strong>
        </li>
    </ul>
</body>
</html>
